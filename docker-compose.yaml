version: '3.8'

# 开发环境配置 - 仅启动数据库和 Redis
# 使用方式:
#   docker-compose up -d          # 启动开发环境
#   docker-compose -f docker-compose.prod.yaml up -d  # 启动生产环境

services:
  postgres:
    image: postgres:16-alpine
    container_name: peanut-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: peanut
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - peanut-network

  redis:
    image: redis:7-alpine
    container_name: peanut-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - peanut-network

volumes:
  postgres-data:
  redis-data:

networks:
  peanut-network:
    driver: bridge
